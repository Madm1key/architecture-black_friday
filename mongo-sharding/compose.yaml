services:
  mongos_router:
    container_name: mongos_router
    image: dh-mirror.gitverse.ru/mongo:8.2.3-noble
    restart: always
    ports:
      - "27016:27016"
    networks:
      - app-network
    volumes:
      - shard1-data:/data/db
    command:
      [
        "mongos",
        "--configdb",
        "config_server/config_server:27017",
        "--bind_ip_all",
        "--port",
        "27016"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  config_server:
    container_name: config_server
    image: dh-mirror.gitverse.ru/mongo:8.2.3-noble
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - config-data:/data/db
    networks:
      - app-network
    command:
      [
        "--configsvr",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  shard1:
    container_name: shard1
    image: dh-mirror.gitverse.ru/mongo:8.2.3-noble
    restart: always
    ports:
      - "27018:27018"
    networks:
      - app-network
    volumes:
      - shard1-data:/data/db
    command:
      [
        "--shardsvr",
        "--bind_ip_all",
        "--port",
        "27018"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  shard2:
    container_name: shard2
    image: dh-mirror.gitverse.ru/mongo:8.2.3-noble
    restart: always
    ports:
      - "27019:27019"
    networks:
      - app-network
    volumes:
      - shard1-data:/data/db
    command:
      [
        "--shardsvr",
        "--bind_ip_all",
        "--port",
        "27019"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongodb1
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongodb1"
      MONGODB_DATABASE_NAME: "somedb"


networks:
  app-network:

volumes:
  mongodb1_data_container:
